aid: carbon-intensity
url: https://raw.githubusercontent.com/api-evangelist/carbon-intensity/refs/heads/main/apis.yml
name: Carbon Intensity API
description: >-
  The Carbon Intensity API is the official carbon intensity forecasting service
  for Great Britain, developed by the National Energy System Operator (NESO) in
  partnership with EDF, the University of Oxford, and WWF. It provides real-time,
  forecast, and historical carbon intensity data alongside generation mix
  information for GB electricity, with 96+ hour forecasts and 30-minute temporal
  resolution across 14 regional DNO boundaries. The API is publicly accessible
  with no authentication required and is licensed under CC BY 4.0.
