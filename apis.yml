apis:
  - aid: carbon-intensity:carbon-intensity-api
    name: Carbon Intensity API
    description: >-
      REST API providing real-time, forecast, and historical carbon intensity
      and fuel generation mix data for Great Britain electricity generation.
      Covers national and 14 regional datasets including England, Scotland, and
      Wales, with postcode-level queries and up to 48-hour forward forecasts.
